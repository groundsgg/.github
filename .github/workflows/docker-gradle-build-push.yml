name: Docker Gradle Build and Push

on:
  workflow_call:
    secrets:
      PACKAGES_TOKEN:
        description: >
          Optional token used to resolve GitHub Packages dependencies. Needed
          only when a build depends on a Maven package owned by a *different*
          private repository: Maven packages are repository-scoped, so they
          inherit that repository's permissions, and the per-job GITHUB_TOKEN
          is scoped to the calling repository alone. Falls back to
          GITHUB_TOKEN when unset, which is right for every repo whose
          dependencies are public or its own.
        required: false

jobs:
  docker-build-push:
    # amd64 on purpose. The clusters this image runs on are amd64 (both UKS
    # node pools report it), and an arm64-only image gets pulled happily and
    # then dies at exec with "exec format error" — which is exactly what
    # happened to grounds-forge 4.3.0 in its migrate init container. Building
    # an amd64 image on an arm64 runner would mean QEMU for the whole build.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      TAG_TYPE: ${{ github.ref_type == 'tag' && 'release' || 'edge' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gradle
          {
            echo "github.user=${{ github.actor }}"
            echo "github.token=${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}"
          } > ~/.gradle/gradle.properties

      - name: Read Gradle project version
        id: gradle_version
        run: |
          set -euo pipefail
          props="$(./gradlew -q properties)"
          version="$(printf '%s\n' "$props" | awk -F': ' '/^version: /{print $2; exit}')"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Prepare Docker auth config
        run: |
          docker_config="${{ runner.temp }}/docker-config"
          mkdir -p "$docker_config"
          echo "DOCKER_CONFIG=${docker_config}" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=match,pattern=v(.*),group=1,enable=${{ env.TAG_TYPE == 'release' }}
            type=raw,value=edge,enable=${{ env.TAG_TYPE != 'release' }}
            type=sha,prefix=sha-,enable=${{ env.TAG_TYPE != 'release' }}
          labels: |
            org.opencontainers.image.authors=Grounds Development Team
            org.opencontainers.image.created={{date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://docs.grounds.gg
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.gradle_version.outputs.value }}
            org.opencontainers.image.vendor=Grounds
            org.opencontainers.image.ref.name=${{ github.sha }}

      - name: Build image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_USER=${{ github.actor }}
          secrets: |
            github_token=${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: useblacksmith/build-push-action@v2
        with:
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_USER=${{ github.actor }}
          secrets: |
            github_token=${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          output-file: sbom.spdx.json
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ env.TAG_TYPE }}
          path: sbom.spdx.json
          retention-days: 30
