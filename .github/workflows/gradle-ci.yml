name: Gradle CI

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label. Defaults to a 4 vCPU arm64 Blacksmith runner, which has Docker for testcontainers / Quarkus dev-services. Pass an amd64 label (blacksmith-4vcpu-ubuntu-2404) if a test image has no arm64 variant."
        required: false
        type: string
        default: blacksmith-4vcpu-ubuntu-2404-arm
    secrets:
      PACKAGES_TOKEN:
        description: >
          Optional token used to resolve GitHub Packages dependencies. Needed
          only when a build depends on a Maven package owned by a *different*
          private repository: Maven packages are repository-scoped, so they
          inherit that repository's permissions, and the per-job GITHUB_TOKEN
          is scoped to the calling repository alone. Falls back to
          GITHUB_TOKEN when unset, which is right for every repo whose
          dependencies are public or its own.
        required: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gradle
          {
            echo "github.user=${{ github.actor }}"
            echo "github.token=${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}"
          } > ~/.gradle/gradle.properties

      - name: Build
        run: |
          ./gradlew build --exclude-task test

      - name: Test
        run: |
          ./gradlew test
