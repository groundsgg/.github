name: Gradle CI

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label. arc-dind (default) has Docker for testcontainers / Quarkus dev-services; pass arc-linux for plugins without container tests."
        required: false
        type: string
        default: arc-dind

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gradle
          {
            echo "github.user=${{ github.actor }}"
            echo "github.token=${{ secrets.GITHUB_TOKEN }}"
          } > ~/.gradle/gradle.properties

      - name: Build
        run: |
          ./gradlew build --exclude-task test

      - name: Test
        run: |
          ./gradlew test
