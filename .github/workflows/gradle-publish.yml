name: Gradle Publish Release

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label. arc-dind (default) has Docker for testcontainers / Quarkus dev-services; pass arc-linux for plugins without container tests."
        required: false
        type: string
        default: arc-dind

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gradle
          {
            echo "github.user=${{ github.actor }}"
            echo "github.token=${{ secrets.GITHUB_TOKEN }}"
          } > ~/.gradle/gradle.properties

      - name: Build
        run: ./gradlew build -Pversion=${{ github.ref_name }}

      - name: Publish package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="${GITHUB_REF#refs/tags/}"
          # Remove the leading 'v' from the tag to get the version number
          version_override="${tag_name#v}"

          ./gradlew publish -PversionOverride="$version_override"
