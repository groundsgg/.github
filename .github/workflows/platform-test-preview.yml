name: Platform-Test Preview

# Reusable workflow that builds + signs a component image with a
# PR-specific tag, then asks forge to spin up an ephemeral preview
# vCluster (or evict it on PR close). See:
#
#   https://github.com/groundsgg/grounds-platform/blob/main/docs/specs/2026-05-03-platform-test-pr-preview.md
#
# Consuming repo example:
#
#   # .github/workflows/preview.yml
#   name: PR Preview
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened, closed]
#   jobs:
#     preview:
#       uses: groundsgg/.github/.github/workflows/platform-test-preview.yml@main
#       with:
#         component-name: plugin-social
#         bundle-version: "0.4.0"
#         ttl-hours: 12
#       secrets:
#         KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
#         KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
#         COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
#         COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
#
# The workflow mints a fresh Keycloak access token via client-credentials
# at the start of every forge call. This avoids having a long-lived
# bearer token in repo secrets that would expire silently between PR
# events; only the (refreshable) client credentials are stored.

on:
  workflow_call:
    inputs:
      component-name:
        description: "Bundle component name to override (matches bundle.yaml)."
        required: true
        type: string
      bundle-version:
        description: "PlatformBundle ref to deploy (e.g. 0.4.0, main)."
        required: true
        type: string
      ttl-hours:
        description: "Preview lifetime, 1-48 hours. Refreshed on each synchronize."
        required: false
        type: number
        default: 12
      forge-base-url:
        description: "Forge API base URL. Override only for staging."
        required: false
        type: string
        default: "https://forge.platform.grnds.io"
      keycloak-token-url:
        description: "Keycloak OIDC token endpoint."
        required: false
        type: string
        default: "https://account.grounds.gg/realms/grounds/protocol/openid-connect/token"
    secrets:
      KEYCLOAK_CLIENT_ID:
        description: "Keycloak confidential client (typically `grounds-ci-tester`)."
        required: true
      KEYCLOAK_CLIENT_SECRET:
        description: "Client secret for KEYCLOAK_CLIENT_ID."
        required: true
      COSIGN_PRIVATE_KEY:
        description: "Private key used by cosign to sign the built image."
        required: true
      COSIGN_PASSWORD:
        description: "Password for decrypting the cosign private key."
        required: true

concurrency:
  group: platform-test-preview-${{ github.repository }}-${{ github.event.pull_request.number }}-${{ inputs.component-name }}
  cancel-in-progress: true

jobs:
  # ── Build + push image (skipped on PR close) ──────────────────────
  build:
    if: github.event.action != 'closed'
    runs-on: arc-dind
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - id: tag
        run: echo "value=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}
          # Build on every commit — preview is supposed to track the
          # PR head, so cache aggressively across PR pushes.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@v4
        with:
          cosign-release: v2.4.3

      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key=env://COSIGN_PRIVATE_KEY \
            ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

  # ── Mint / refresh the preview vCluster ───────────────────────────
  mint:
    if: github.event.action != 'closed'
    needs: build
    runs-on: arc-linux
    permissions:
      pull-requests: write
    steps:
      - name: Mint forge access token
        id: token
        env:
          KEYCLOAK_TOKEN_URL: ${{ inputs.keycloak-token-url }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          response=$(curl -sS -X POST "$KEYCLOAK_TOKEN_URL" \
            -d "grant_type=client_credentials" \
            -u "$KEYCLOAK_CLIENT_ID:$KEYCLOAK_CLIENT_SECRET" \
            -w "\n%{http_code}")
          status=$(printf '%s\n' "$response" | tail -n1)
          payload=$(printf '%s\n' "$response" | sed '$d')
          if [ "$status" != "200" ]; then
            echo "Keycloak token mint failed (status=$status): $payload" >&2
            exit 1
          fi
          token=$(printf '%s' "$payload" | jq -r .access_token)
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Keycloak responded 200 but no access_token in body: $payload" >&2
            exit 1
          fi
          # Mask the token in subsequent log output.
          printf '::add-mask::%s\n' "$token"
          echo "value=$token" >> "$GITHUB_OUTPUT"

      - name: POST /v1/cluster/preview-bundle
        id: forge
        env:
          FORGE_TOKEN: ${{ steps.token.outputs.value }}
          FORGE_URL: ${{ inputs.forge-base-url }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          COMPONENT: ${{ inputs.component-name }}
          TAG: ${{ needs.build.outputs.image-tag }}
          BUNDLE: ${{ inputs.bundle-version }}
          TTL: ${{ inputs.ttl-hours }}
        run: |
          set -euo pipefail
          body=$(jq -n \
            --arg bundle "$BUNDLE" \
            --arg repo "$REPO" \
            --argjson prNumber "$PR_NUMBER" \
            --arg sha "$COMMIT_SHA" \
            --arg cn "$COMPONENT" \
            --arg tag "$TAG" \
            --argjson ttl "$TTL" \
            '{bundle: $bundle, repo: $repo, prNumber: $prNumber, sourceCommitSha: $sha,
              componentOverride: {componentName: $cn, tag: $tag}, ttlHours: $ttl}')
          response=$(curl -sS -X POST "$FORGE_URL/v1/cluster/preview-bundle" \
            -H "Authorization: Bearer $FORGE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$body" \
            -w "\n%{http_code}")
          status=$(printf '%s\n' "$response" | tail -n1)
          payload=$(printf '%s\n' "$response" | sed '$d')
          # forge provisions in a background worker and answers 202; the next
          # step polls for the outcome.
          if [ "$status" != "202" ]; then
            echo "forge returned $status: $payload" >&2
            exit 1
          fi
          echo "namespace=$(printf '%s' "$payload" | jq -r .namespace)" >> "$GITHUB_OUTPUT"

      - name: Wait for the preview to provision
        id: preview
        env:
          FORGE_TOKEN: ${{ steps.token.outputs.value }}
          FORGE_URL: ${{ inputs.forge-base-url }}
          NAMESPACE: ${{ steps.forge.outputs.namespace }}
          KEYCLOAK_TOKEN_URL: ${{ inputs.keycloak-token-url }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          token="$FORGE_TOKEN"

          # A bundle provision runs for minutes, well past the Keycloak access
          # token's TTL, so re-mint whenever forge says the token expired.
          mint() {
            local response status payload
            response=$(curl -sS -X POST "$KEYCLOAK_TOKEN_URL" \
              -d "grant_type=client_credentials" \
              -u "$KEYCLOAK_CLIENT_ID:$KEYCLOAK_CLIENT_SECRET" \
              -w "\n%{http_code}")
            status=$(printf '%s\n' "$response" | tail -n1)
            payload=$(printf '%s\n' "$response" | sed '$d')
            if [ "$status" != "200" ]; then
              echo "Keycloak token re-mint failed (status=$status)" >&2
              return 1
            fi
            token=$(printf '%s' "$payload" | jq -r .access_token)
            printf '::add-mask::%s\n' "$token"
          }

          deadline=$(( $(date +%s) + 1800 ))
          while :; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "preview $NAMESPACE still provisioning after 30m" >&2
              exit 1
            fi

            response=$(curl -sS "$FORGE_URL/v1/cluster/preview-bundle/$NAMESPACE" \
              -H "Authorization: Bearer $token" \
              -w "\n%{http_code}")
            status=$(printf '%s\n' "$response" | tail -n1)
            payload=$(printf '%s\n' "$response" | sed '$d')

            if [ "$status" = "401" ]; then
              mint
              sleep 5
              continue
            fi

            if [ "$status" = "200" ]; then
              state=$(printf '%s' "$payload" | jq -r .state)
              if [ "$state" = "active" ]; then
                break
              fi
              if [ "$state" = "failed" ]; then
                echo "preview failed: $(printf '%s' "$payload" | jq -r '.error // "unknown"')" >&2
                exit 1
              fi
            else
              # Transient (502 during a rollout, 404 before the row is visible) —
              # keep polling until the deadline rather than failing the run.
              echo "poll returned $status: $payload" >&2
            fi

            sleep 15
          done

          # Surface key fields for the comment step.
          echo "expires=$(printf '%s' "$payload" | jq -r .expiresAt)" >> "$GITHUB_OUTPUT"
          echo "succeeded=$(printf '%s' "$payload" | jq -r '.components.succeeded | length')" >> "$GITHUB_OUTPUT"
          echo "resolved=$(printf '%s' "$payload" | jq -r '.components.resolved')" >> "$GITHUB_OUTPUT"
          echo "failed_json=$(printf '%s' "$payload" | jq -c '.components.failed')" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v9
        env:
          NAMESPACE: ${{ steps.forge.outputs.namespace }}
          EXPIRES: ${{ steps.preview.outputs.expires }}
          SUCCEEDED: ${{ steps.preview.outputs.succeeded }}
          RESOLVED: ${{ steps.preview.outputs.resolved }}
          FAILED: ${{ steps.preview.outputs.failed_json }}
        with:
          script: |
            const failed = JSON.parse(process.env.FAILED || "[]");
            const failedLines = failed.map(f => `  - \`${f.name}\`: ${f.error}`).join('\n');
            const body = [
              `🧪 **Platform-test preview ready**`,
              ``,
              `Namespace: \`${process.env.NAMESPACE}\``,
              `Expires: ${process.env.EXPIRES}`,
              `Components: ${process.env.SUCCEEDED}/${process.env.RESOLVED} succeeded`,
              failed.length ? `\nFailed components:\n${failedLines}` : '',
              ``,
              `Access:`,
              "```",
              `kubectl --context=platform-cluster -n ${process.env.NAMESPACE} get secret ${process.env.NAMESPACE} -o jsonpath='{.data.config}' | base64 -d > kc`,
              "```",
              ``,
              `_Refreshed on every push. The preview is evicted automatically when the PR is closed._`,
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const marker = '🧪 **Platform-test preview ready**';
            const existing = comments.find(c => c.body && c.body.startsWith(marker) && c.user.type === 'Bot');
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Evict on PR close ─────────────────────────────────────────────
  evict:
    if: github.event.action == 'closed'
    runs-on: arc-linux
    steps:
      - name: Mint forge access token
        id: token
        env:
          KEYCLOAK_TOKEN_URL: ${{ inputs.keycloak-token-url }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          response=$(curl -sS -X POST "$KEYCLOAK_TOKEN_URL" \
            -d "grant_type=client_credentials" \
            -u "$KEYCLOAK_CLIENT_ID:$KEYCLOAK_CLIENT_SECRET" \
            -w "\n%{http_code}")
          status=$(printf '%s\n' "$response" | tail -n1)
          payload=$(printf '%s\n' "$response" | sed '$d')
          if [ "$status" != "200" ]; then
            echo "Keycloak token mint failed (status=$status): $payload" >&2
            exit 1
          fi
          token=$(printf '%s' "$payload" | jq -r .access_token)
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Keycloak responded 200 but no access_token in body: $payload" >&2
            exit 1
          fi
          printf '::add-mask::%s\n' "$token"
          echo "value=$token" >> "$GITHUB_OUTPUT"

      - name: DELETE /v1/cluster/preview-bundle/:namespace
        env:
          FORGE_TOKEN: ${{ steps.token.outputs.value }}
          FORGE_URL: ${{ inputs.forge-base-url }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Mirror the namespace-derivation rule the reconciler uses:
          # "vcluster-pr-<repo-shortname-lowercase>-<n>".
          repo_short=$(printf '%s' "${REPO##*/}" | tr '[:upper:]' '[:lower:]')
          namespace="vcluster-pr-${repo_short}-${PR_NUMBER}"
          curl -sS -X DELETE "$FORGE_URL/v1/cluster/preview-bundle/$namespace" \
            -H "Authorization: Bearer $FORGE_TOKEN" \
            -w "\n%{http_code}" \
            -o /tmp/resp \
            | tee /tmp/status
          status=$(tail -n1 /tmp/status)
          if [ "$status" != "200" ] && [ "$status" != "404" ]; then
            echo "forge returned $status:" >&2
            cat /tmp/resp >&2
            exit 1
          fi
          echo "✔ Preview vCluster $namespace evicted (or already gone)."
