name: Release Please

on:
  workflow_call:
    secrets:
      RELEASE_PLEASE_TOKEN:
        description: 'The GitHub token used to create releases.'
        required: true

jobs:
  release-please:
    name: Create Release
    runs-on: arc-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Release Please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
